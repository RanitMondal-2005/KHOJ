{% extends 'base.html' %}
{% block title %}Confirm{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:500px;">
  <div class="card">
    <div class="card-body text-center p-4">
      <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
      <h5>Mark Patient as Identified?</h5>
      <p class="text-muted">{{ patient.estimated_name|default:"This patient" }} will be moved to the resolved section.</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-success px-4 me-2">Confirm</button>
        <a href="{% url 'hospital:patient_detail' patient.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
